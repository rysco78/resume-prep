version: 1.0
runtime: nodejs20
build:
  commands:
    build:
      - npm ci
      - npm run build
run:
  runtime-version: 20
  command: node .next/standalone/server.js
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: production
    - name: AWS_REGION
      value: us-east-2
    - name: S3_BUCKET_NAME
      value: resume-prep-files
